		<!--titulo principal-->
		<h1>Gestión de instalaciones</h1>

	<!--CONTENIDO-->
	<main>
		<section>
			<h2 id="tituloForm">Por favor, complete los campos a continuacion</h2>
			<form action="#" method="post">
				<fieldset>
				<label for="cantidad">Ingrese la cantidad de instalaciones a producir</label>
				<input type="number" name="cantidad" id="cantidad">
				<label for="nombre">Nombre de la instalación</label>
				<input type="text" name="nombre" id="nombre">
				</fieldset>
				<fieldset>
				<label for="trabajadores">Cantidad de trabajadores necesarios</label>
				<input type="number" name="trabajadores" id="trabajadores">
				<label for="produccion">Dias de produccion estimados</label>
				<input type="number" name="produccion" id="produccion">
				<label for="horario">Horas laborales de cada trabajador por día</label>
				<input type="number" name="horario" id="horario">
				<label for="cobro">Valor de cobro del honorario por hora</label>
				<input type="number" name="cobro" id="cobro">
				</fieldset>
				<button type="submit">Enviar</button>
                <button type="reset">Borrar</button>
			</form>
		</section>
	</main>

	<!--pie de página-->
